---
name: Build HomeScope

on:
  pull_request:
    paths:
      - homescope/**
      - .github/workflows/build-homescope.yml
  push:
    branches:
      - main
    paths:
      - homescope/**
      - .github/workflows/build-homescope.yml
  workflow_dispatch:

env:
  ARCHITECTURES: '["amd64", "aarch64"]'
  IMAGE_NAME: homescope
  REGISTRY_PREFIX: ghcr.io/${{ github.repository_owner }}

permissions:
  contents: read

jobs:
  init:
    name: Initialize build
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve add-on version
        id: version
        shell: bash
        run: |
          version="$(sed -n 's/^version: "\([^"]*\)"/\1/p' homescope/config.yaml)"
          if [[ -z "${version}" ]]; then
            echo "::error::Could not read homescope/config.yaml version"
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Get build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.03.2
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.IMAGE_NAME }}
          registry-prefix: ${{ env.REGISTRY_PREFIX }}

  build:
    name: Build ${{ matrix.arch }} image
    needs: init
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build image
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: ./homescope
          cosign: "false"
          image: ${{ matrix.image }}
          image-tags: |
            ci-${{ github.sha }}
          push: "false"
          version: ${{ needs.init.outputs.version }}
