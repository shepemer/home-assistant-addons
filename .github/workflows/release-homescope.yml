---
name: Release HomeScope

on:
  push:
    tags:
      - homescope-v*.*.*
  workflow_dispatch:
    inputs:
      version:
        description: Release version without a leading v
        required: true
        default: 1.0.1

env:
  ARCHITECTURES: '["amd64", "aarch64"]'
  IMAGE_NAME: homescope
  REGISTRY_PREFIX: ghcr.io/${{ github.repository_owner }}

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  init:
    name: Initialize release
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ -n "${INPUT_VERSION}" ]]; then
            version="${INPUT_VERSION#v}"
          else
            version="${REF_NAME#homescope-v}"
          fi

          config_version="$(sed -n 's/^version: "\([^"]*\)"/\1/p' homescope/config.yaml)"
          package_version="$(
            node -e "console.log(require('./homescope/package.json').version)"
          )"

          if [[ "${config_version}" != "${version}" ]]; then
            echo "::error::config.yaml version ${config_version} does not match release version ${version}"
            exit 1
          fi

          if [[ "${package_version}" != "${version}" ]]; then
            echo "::error::package.json version ${package_version} does not match release version ${version}"
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Get build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.03.2
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.IMAGE_NAME }}
          registry-prefix: ${{ env.REGISTRY_PREFIX }}

  build:
    name: Build and publish ${{ matrix.arch }} image
    needs: init
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build and publish image
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: ./homescope
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.init.outputs.version }}
            latest
          push: "true"
          version: ${{ needs.init.outputs.version }}

  manifest:
    name: Publish multi-arch manifest
    needs:
      - init
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.03.2
        with:
          architectures: ${{ env.ARCHITECTURES }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ env.IMAGE_NAME }}
          image-tags: |
            ${{ needs.init.outputs.version }}
            latest
          registry-prefix: ${{ env.REGISTRY_PREFIX }}
