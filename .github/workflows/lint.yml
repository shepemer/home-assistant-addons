---
name: Lint

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  addon:
    name: Add-on configuration (${{ matrix.addon }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        addon:
          - codex-terminal
          - homescope
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run Home Assistant add-on linter
        uses: frenck/action-addon-linter@v2
        with:
          path: ./${{ matrix.addon }}

  shell:
    name: Shell
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: shellcheck -s bash -e SC1008 codex-terminal/run.sh homescope/run.sh

  yaml:
    name: YAML
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install yamllint
        run: |
          sudo apt-get update
          sudo apt-get install -y yamllint

      - name: Run yamllint
        run: yamllint .

  actions:
    name: GitHub Actions
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install actionlint
        run: bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
        shell: bash

      - name: Run actionlint
        run: ./actionlint
