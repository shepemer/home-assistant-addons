name: Codex Terminal
description: "Terminal interface for the OpenAI Codex CLI, with Home Assistant MCP integration"
version: "1.1.3"
slug: codex_terminal
url: https://github.com/shepemer/home-assistant-addons/tree/main/codex-terminal
image: ghcr.io/shepemer/codex-terminal
init: false
arch:
  - aarch64
  - amd64
homeassistant_api: true
hassio_api: true
hassio_role: manager
auth_api: true
ingress: true
ingress_port: 7681
ports:
  2222/tcp: null
ports_description:
  2222/tcp: "SSH access to the Codex Terminal container"
panel_icon: mdi:robot
panel_title: Codex Terminal
map:
  - type: homeassistant_config
    read_only: false
    path: /config
  - type: addons
    read_only: false
    path: /addons
  - type: share
    read_only: false
options:
  auto_launch: true
  enable_ha_mcp: true
  enable_ssh: false
  ssh_username: root
  ssh_password: ""
  ssh_authorized_keys: []
  enable_remote_control: false
schema:
  auto_launch: bool
  enable_ha_mcp: bool
  enable_ssh: bool
  ssh_username: str?
  ssh_password: password?
  ssh_authorized_keys:
    - str
  enable_remote_control: bool
